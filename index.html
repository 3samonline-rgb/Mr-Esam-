<!DOCTYPE html>
<html lang="no" dir="ltr" id="appHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pris App - Super Fast Entry</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f1f5f9; margin: 0; padding: 10px; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 480px; margin: auto; background: white; padding: 15px 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .top-bar { display: flex; gap: 4px; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
        .top-bar button { flex: 1; min-width: 0; padding: 8px 4px; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        
        .lang-btn { background: #3b82f6; }
        .print-main-btn { background: #475569; }
        .print-staff-btn { background: #0284c7; }
        .export-btn { background: #059669; }

        h1 { font-size: 24px; font-weight: 800; margin: 0; text-align: center; color: #0f172a; }
        .subtitle { font-size: 11px; font-weight: 700; color: #10b981; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 15px; }
        
        .section-title { font-size: 15px; font-weight: 700; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; margin: 20px 0 10px 0; color: #334155; }
        
        .form-group { background: #f8fafc; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; text-align: left; position: relative; }
        
        label { font-size: 11px; font-weight: bold; color: #64748b; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white; color: #0f172a; text-align: left; }
        input:focus, select:focus { border-color: #10b981; outline: none; }
        
        /* قائمة المقترحات الفورية السريعة للبحث بالاسم أو الباركود */
        .suggestions-list { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 2px solid #10b981; border-top: none; border-radius: 0 0 8px 8px; max-height: 220px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: none; padding: 0; margin: 0; list-style: none; }
        .suggestions-list li { padding: 10px; font-size: 13px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; text-align: left; }
        .suggestions-list li:hover { background: #ecfdf5; }
        .suggestions-list li .suggest-meta { display: flex; gap: 6px; font-size: 10px; color: #64748b; font-weight: bold; margin-top: 2px; }
        .suggestions-list li .badge { background: #e2e8f0; padding: 1px 4px; border-radius: 4px; }

        .row { display: flex; gap: 8px; margin-bottom: 4px; }
        .col { flex: 1; }
        
        .calc-box { background: #ecfdf5; border: 2px dashed #10b981; border-radius: 10px; padding: 12px; margin-top: 8px; text-align: left; }
        .calc-result { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        
        .editable-price-input { width: 120px; text-align: right; font-size: 18px; font-weight: 900; color: #059669; border: 1px solid #10b981; padding: 4px 6px; border-radius: 6px; }
        .profit-unit-amount { font-size: 16px; color: #dc2626; font-weight: 800; }
        
        .btn { width: 100%; background: #10b981; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15); }
        .btn:active { transform: scale(0.97); }
        
        .search-box { width: 100%; padding: 10px; margin: 12px 0; border: 2px solid #10b981; border-radius: 8px; font-size: 14px; text-align: left; }
        
        .supplier-block { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px; margin-bottom: 15px; text-align: left; }
        .supplier-header { display: flex; flex-direction: column; gap: 4px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; margin-bottom: 10px; }
        .supplier-header-top { display: flex; justify-content: space-between; align-items: center; }
        .supplier-title { font-size: 15px; font-weight: 800; color: #1e293b; }
        .supplier-actions { display: flex; gap: 4px; width: 100%; justify-content: flex-start; }
        
        .whatsapp-btn { background: #25d366; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .share-me-btn { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .product-card { background: white; border: 1px solid #f1f5f9; border-radius: 10px; padding: 10px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.01); position: relative; }
        .select-box-container { display: flex; align-items: center; justify-content: center; }
        .select-box { width: 18px; height: 18px; cursor: pointer; }
        
        .product-details { flex: 1; min-width: 0; text-align: left; }
        .p-name { font-weight: 700; font-size: 14px; color: #0f172a; margin: 0; text-align: left; }
        .p-meta { font-size: 11px; margin-top: 2px; color: #64748b; text-align: left; }
        
        .p-prices { text-align: right; min-width: 115px; display: flex; flex-direction: column; align-items: flex-end; }
        .p-sales-price { font-size: 16px; font-weight: 800; color: #059669; }
        .p-cost { font-size: 11px; color: #64748b; margin-top: 1px; white-space: nowrap; }
        .p-profit { font-size: 11px; color: #dc2626; font-weight: bold; white-space: nowrap; }

        .reorder-bar { background: #fffbeb; border: 1px solid #fef3c7; padding: 10px; border-radius: 10px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
        .reorder-btn { background: #d97706; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .actions-row { display: flex; gap: 4px; margin-top: 4px; }
        .action-btn { border: none; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }
        .edit-btn { background: #f59e0b; }
        .del-btn { background: #ef4444; }

        .print-header { display: none; text-align: center; margin-bottom: 20px; font-size: 14px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 10px; }

        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .top-bar, .section-title, .form-group, .row, .calc-box, #saveBtn, .search-box, .supplier-actions, .actions-row, .reorder-bar, .select-box-container, h1, .subtitle, .suggestions-list { display: none !important; }
            .app-container { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; background: white !important; }
            .print-header { display: block !important; }
            .supplier-block { background: white !important; border: none !important; padding: 0 !important; margin-bottom: 15px !important; page-break-inside: avoid; }
            .supplier-header { border-bottom: 1px dashed #000 !important; }
            .product-card { border-bottom: 1px solid #eee !important; border-radius: 0 !important; box-shadow: none !important; background: white !important; page-break-inside: avoid; padding: 8px 0 !important; }
            .p-sales-price { color: black !important; font-size: 17px !important; }
            
            body.staff-print-mode .p-cost, 
            body.staff-print-mode .p-profit, 
            body.staff-print-mode .p-meta { display: none !important; }
            body.staff-print-mode .supplier-title { font-size: 13px !important; font-weight: normal !important; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <button class="lang-btn" onclick="toggleLanguage()" id="btnLang">NO / AR</button>
        <button class="print-main-btn" onclick="triggerPrint(false)">Eier Print 🖨️</button>
        <button class="print-staff-btn" onclick="triggerPrint(true)">Ansatte Print 👤</button>
        <button class="export-btn" onclick="exportData()">Export 📤</button>
    </div>

    <h1>Pris App</h1>
    <div class="subtitle" id="subTitle">by Mr. Intl (Kalkulator & Ordre)</div>

    <div class="print-header" id="printHeaderView"></div>
    
    <input type="hidden" id="editId" value="">
    
    <div class="form-group">
        <label id="lblProdName">Produktnavn / Strekkode</label>
        <input type="text" id="prodName" placeholder="Søk på navn eller strekkode..." oninput="showSuggestions(this)" autocomplete="off">
        <ul id="suggestionsBox" class="suggestions-list"></ul>
    </div>
    
    <div class="row">
        <div class="col" style="flex: 1.5;">
            <div class="form-group">
                <label id="lblCostPrice">Innkjøpspris (Total)</label>
                <input type="text" inputmode="decimal" pattern="[0-9]*([\.,][0-9]*)?" id="costPrice" placeholder="0.00" oninput="cleanAndCalculate(this, true)" onkeydown="handleEnterKey(event)">
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label id="lblQty">Antall</label>
                <input type="text" inputmode="decimal" pattern="[0-9]*([\.,][0-9]*)?" id="quantity" placeholder="1" oninput="cleanAndCalculate(this, true)" onkeydown="handleEnterKey(event)">
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col">
            <div class="form-group">
                <label id="lblMargin">Margin</label>
                <select id="marginSelect" onchange="calculatePricing(true)">
                    <option value="1.3">1.3</option>
                    <option value="1.4">1.4</option>
                    <option value="1.5" selected>1.5</option>
                    <option value="1.6">1.6</option>
                    <option value="1.7">1.7</option>
                    <option value="1.8">1.8</option>
                    <option value="1.9">1.9</option>
                    <option value="2.0">2.0</option>
                </select>
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label id="lblMva">MVA</label>
                <select id="vvaSelect" onchange="calculatePricing(true)">
                    <option value="0.25">25% (Standard)</option>
                    <option value="0.15" selected>15% (Matvarer)</option>
                    <option value="0">0% (Ingen)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <div class="form-group">
                <label id="lblSupplier">Leverandør</label>
                <input type="text" id="supplierName" placeholder="F.eks. Afro kjøp">
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label id="lblVaregruppe">Varegruppe</label>
                <select id="varegruppeSelect">
                    <option value="Tørrvarer" selected>Tørrvarer</option>
                    <option value="Drikke">Drikke</option>
                    <option value="Kosmetikk">Kosmetikk</option>
                    <option value="Ferskvarer">Ferskvarer</option>
                    <option value="Andre">Andre</option>
                </select>
            </div>
        </div>
    </div>

    <div class="calc-box">
        <div class="calc-result"><span id="txtUnitCost">Innkjøpspris per enhet (Eks. MVA)</span>: <span id="resUnitCost">0.00 kr</span></div>
        <div class="calc-result"><span id="txtExMva">Utsalgspris eks. MVA</span>: <span id="resExMva">0.00 kr</span></div>
        <div class="calc-result" style="margin-top: 8px; border-top: 1px dashed #10b981; padding-top: 8px;">
            <div id="txtFinalPrice" style="font-weight: bold;">Utsalgspris (Ink. MVA):</div>
            <input type="text" inputmode="decimal" pattern="[0-9]*([\.,][0-9]*)?" id="resFinalUnitPriceInput" class="editable-price-input" value="0.00" oninput="cleanAndCalculate(this, false)">
        </div>
        <div class="calc-result">
            <div id="txtProfit">Fortjeneste:</div>
            <div class="profit-unit-amount" id="resUnitProfit">0.00 kr</div>
        </div>
    </div>

    <button class="btn" id="saveBtn" onclick="saveToOrderList()">Lagre i ordreliste (Enter ↵)</button>

    <div class="section-title" id="tSection2">Leverandørbestillinger</div>
    <input type="text" id="searchBar" class="search-box" placeholder="Søk efter produkt eller strekkode..." oninput="renderOrders()">

    <div id="ordersContainer"></div>

    <div class="reorder-bar">
        <span id="txtSelectedCount">0 valgt</span>
        <button class="reorder-btn" onclick="bulkReorder()" id="btnReorder">Send reorder 🛒</button>
    </div>
</div>

<script>
    // جميع المنتجات المستخرجة بدقة عالية من ملفك الـ Excel (الأسماء تظهر LTR لترتيب صحيح)
    let productCatalog = [
      { "barcode": "5017689012137", "name": "Trs Dalchini Cinamon Whole 50g", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "25%" },
      { "barcode": "5017689002565", "name": "ginger", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "0%" },
      { "barcode": "5578", "name": "Cola", "supplier": "", "varegruppe": "Drikke", "mva": "15%" },
      { "barcode": "1", "name": "Norsk potet", "supplier": "", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "5017689006617", "name": "Trs Black Pepper Powder 100g", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "5017689010669", "name": "Trs Black Pepper Coarse 100g", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "2", "name": "Khanum Butter Ghee 500g", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "5019124056058", "name": "Khanum Butter Ghee 2kg", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "4", "name": "Khanum Veg. Ghee 2kg", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481393", "name": "Vincinni Tea Cookies Choco 800gr", "supplier": "Elite Engros", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481394", "name": "Monter ULTRA VIOLET", "supplier": "NORDIC Engros", "varegruppe": "Drikke", "mva": "15%" },
      { "barcode": "481395", "name": "Treet PLATINUM", "supplier": "Norbygate as", "varegruppe": "Kosmetikk", "mva": "15%" },
      { "barcode": "481396", "name": "Vincinni Tea Cookies Choco 400g", "supplier": "Elite Engros", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481397", "name": "Pluto Sumak Pulver 500g", "supplier": "PLUTO IMPORT", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481398", "name": "Trs Rosecoco Beans 2kg", "supplier": "Norbygate as", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481399", "name": "DIAMANT Sukker 2kg", "supplier": "Liya", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481400", "name": "Durra Pickled Grape Leaves 1200g", "supplier": "Ramco Norge", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481402", "name": "BASRA DATE SYRUP 400g", "supplier": "Ramco Norge", "varegruppe": "Tørrvarer", "mva": "15%" },
      { "barcode": "481403", "name": "Basimo Mychallale fetaost", "supplier": "Ny varer", "varegruppe": "Tørrvarer", "mva": "15%" }
    ];

    let savedOrders = JSON.parse(localStorage.getItem('mr_intl_orders')) || [];
    let currentLang = localStorage.getItem('mr_intl_lang') || 'no';

    const i18n = {
        no: {
            sub: "by Mr. Intl (Kalkulator & Ordre)", sec2: "Leverandørbestillinger",
            prodName: "Produktnavn / Strekkode", cost: "Innkjøpspris (Total)", qty: "Antall", margin: "Margin", mva: "MVA", supplier: "Leverandør",
            varegruppe: "Varegruppe", uCost: "Innkjøpspris per enhet (Eks. MVA)", exMva: "Utsalgspris eks. MVA", fPrice: "Utsalgspris (Ink. MVA):",
            profit: "Fortjeneste:", save: "Lagre i ordreliste (Enter ↵)", update: "Oppdater Produkt", search: "Søk efter produkt...",
            selected: "valgt", reorderBtn: "Send reorder 🛒", edit: "Endre", del: "Slett"
        },
        ar: {
            sub: "بواسطة مستر إنترناشونال (الحاسبة والطلبيات)", sec2: "سجل طلبيات الموردين الحاليين",
            prodName: "اسم المنتج أو الباركود", cost: "سعر الشراء الإجمالي من الفاتورة", qty: "الكمية (عدد القطع)", margin: "Margin (الفائدة)", mva: "MVA (الضريبة)", supplier: "Leverandør (المورد)",
            varegruppe: "المجموعة (Varegruppe)", uCost: "سعر القطعة بدون ضريبة", exMva: "البيع قبل الضريبة", fPrice: "سعر البيع النهائي المتوقع:",
            profit: "Fortjeneste (صافي الربح):", save: "Lagre i ordreliste (اضغط Enter ↵)", update: "تحديث وحفظ المنتج", search: "بحث سريع بالاسم أو الباركود...",
            selected: "محدد", reorderBtn: "إرسال الطلبية مجمعة 🛒", edit: "تعديل", del: "حذف"
        }
    };

    // ميزة المقترحات الفورية والبحث السريع بالاسم والباركود
    function showSuggestions(inputEl) {
        const query = inputEl.value.toLowerCase().trim();
        const box = document.getElementById('suggestionsBox');
        box.innerHTML = '';
        
        if (!query) {
            box.style.display = 'none';
            return;
        }

        const filtered = productCatalog.filter(p => 
            p.name.toLowerCase().includes(query) || 
            (p.barcode && p.barcode.toString().includes(query))
        ).slice(0, 6);

        if (filtered.length > 0) {
            filtered.forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span><b>${p.name}</b></span>
                    <div class="suggest-meta">
                        <span class="badge">${p.supplier || 'Ukjent'}</span>
                        ${p.barcode ? `<span>BC: ${p.barcode}</span>` : ''}
                        <span class="badge" style="background:#ecfdf5; color:#059669">${p.varegruppe}</span>
                    </div>
                `;
                li.onclick = () => selectSuggestion(p);
                box.appendChild(li);
            });
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    // تعبئة البيانات الذكية فوراً عند اختيار المنتج
    function selectSuggestion(product) {
        document.getElementById('prodName').value = product.name;
        document.getElementById('supplierName').value = product.supplier || '';
        document.getElementById('varegruppeSelect').value = product.varegruppe || 'Tørrvarer';
        
        let rawMva = parseFloat(product.mva) / 100;
        if(isNaN(rawMva)) rawMva = 0.15;
        document.getElementById('vvaSelect').value = rawMva;
        
        document.getElementById('suggestionsBox').style.display = 'none';
        
        // الانتقال التلقائي المباشر لخانة السعر لفتح لوحة الأرقام وتوفير الوقت
        document.getElementById('costPrice').focus();
        calculatePricing(true);
    }

    function handleEnterKey(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            saveToOrderList();
        }
    }

    document.addEventListener('click', function(e) {
        if (e.target.id !== 'prodName') {
            document.getElementById('suggestionsBox').style.display = 'none';
        }
    });

    function applyLanguage() {
        const lang = currentLang;
        document.getElementById('subTitle').innerText = i18n[lang].sub;
        document.getElementById('tSection2').innerText = i18n[lang].sec2;
        document.getElementById('lblProdName').innerText = i18n[lang].prodName;
        document.getElementById('lblCostPrice').innerText = i18n[lang].cost;
        document.getElementById('lblQty').innerText = i18n[lang].qty;
        document.getElementById('lblMargin').innerText = i18n[lang].margin;
        document.getElementById('lblMva').innerText = i18n[lang].mva;
        document.getElementById('lblSupplier').innerText = i18n[lang].supplier;
        document.getElementById('lblVaregruppe').innerText = i18n[lang].varegruppe;
        document.getElementById('txtUnitCost').innerText = i18n[lang].uCost;
        document.getElementById('txtExMva').innerText = i18n[lang].exMva;
        document.getElementById('txtFinalPrice').innerText = i18n[lang].fPrice;
        document.getElementById('txtProfit').innerText = i18n[lang].profit;
        document.getElementById('searchBar').placeholder = i18n[lang].search;
        document.getElementById('btnReorder').innerText = i18n[lang].reorderBtn;
        document.getElementById('btnLang').innerText = `Language: ${lang.toUpperCase()}`;
        
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = document.getElementById('editId').value ? i18n[lang].update : i18n[lang].save;
        
        updateSelectedCount();
        renderOrders();
    }

    function toggleLanguage() {
        currentLang = currentLang === 'no' ? 'ar' : 'no';
        localStorage.setItem('mr_intl_lang', currentLang);
        applyLanguage();
    }

    function cleanAndCalculate(inputEl, autoCalculateFinalPrice) {
        let val = inputEl.value.replace(',', '.');
        val = val.replace(/[^0-9.]/g, '');
        inputEl.value = val;
        calculatePricing(autoCalculateFinalPrice);
    }

    function calculatePricing(autoCalculateFinalPrice = true) {
        const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
        const qty = parseFloat(document.getElementById('quantity').value) || 1;
        const margin = parseFloat(document.getElementById('marginSelect').value);
        const mvaRate = parseFloat(document.getElementById('vvaSelect').value);

        if (costPrice === 0) {
            document.getElementById('resUnitProfit').innerText = "0.00 kr";
            return { unitCost: 0, unitFinalPrice: 0, unitProfit: 0 };
        }

        const unitCost = costPrice / qty;
        const unitPriceExMva = unitCost * margin;
        
        let unitFinalPrice = 0;
        if (autoCalculateFinalPrice) {
            unitFinalPrice = unitPriceExMva * (1 + mvaRate);
            document.getElementById('resFinalUnitPriceInput').value = unitFinalPrice.toFixed(2);
        } else {
            unitFinalPrice = parseFloat(document.getElementById('resFinalUnitPriceInput').value) || 0;
        }

        const finalExMva = unitFinalPrice / (1 + mvaRate);
        const unitProfit = finalExMva - unitCost;

        document.getElementById('resUnitCost').innerText = unitCost.toFixed(2) + " kr";
        document.getElementById('resExMva').innerText = unitPriceExMva.toFixed(2) + " kr";
        document.getElementById('resUnitProfit').innerText = (unitProfit >= 0 ? "+" : "") + unitProfit.toFixed(2) + " kr";
        
        return { unitCost, unitFinalPrice, unitProfit };
    }

    function saveToOrderList() {
        const name = document.getElementById('prodName').value.trim();
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const editId = document.getElementById('editId').value;
        
        if (!name || cost === 0) {
            alert(currentLang === 'ar' ? "الرجاء إدخال الاسم وسعر الشراء!" : "Vennligst fyll ut produktnavn og innkjøpspris!");
            return;
        }

        const calc = calculatePricing(false);
        const qty = parseFloat(document.getElementById('quantity').value) || 1;

        const productData = {
            id: editId ? parseInt(editId) : Date.now(),
            name: name,
            cost: cost,
            qty: qty,
            unitCost: (cost / qty).toFixed(2), 
            orderEsker: "1",
            margin: document.getElementById('marginSelect').value,
            mva: (parseFloat(document.getElementById('vvaSelect').value) * 100) + "%",
            supplier: document.getElementById('supplierName').value.trim() || "Ukjent Leverandør",
            varegruppe: document.getElementById('varegruppeSelect').value,
            unitFinalPrice: calc.unitFinalPrice.toFixed(2),
            unitProfit: calc.unitProfit.toFixed(2)
        };

        if (editId) {
            const oldP = savedOrders.find(item => item.id === productData.id);
            if(oldP) productData.orderEsker = oldP.orderEsker;
            savedOrders = savedOrders.map(p => p.id === productData.id ? productData : p);
            document.getElementById('editId').value = "";
        } else {
            savedOrders.unshift(productData);
        }

        localStorage.setItem('mr_intl_orders', JSON.stringify(savedOrders));

        // تصفير الخانات فوراً لتعبئة الفاتورة بسرعة فائقة للقطعة التالية
        document.getElementById('prodName').value = '';
        document.getElementById('costPrice').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('resUnitCost').innerText = "0.00 kr";
        document.getElementById('resExMva').innerText = "0.00 kr";
        document.getElementById('resFinalUnitPriceInput').value = "0.00";
        document.getElementById('resUnitProfit').innerText = "0.00 kr";
        
        applyLanguage();
        document.getElementById('prodName').focus();
    }

    function editProduct(id) {
        const p = savedOrders.find(item => item.id === id);
        if (!p) return;

        document.getElementById('editId').value = p.id;
        document.getElementById('prodName').value = p.name;
        document.getElementById('costPrice').value = p.cost;
        document.getElementById('quantity').value = p.qty;
        document.getElementById('marginSelect').value = p.margin;
        document.getElementById('varegruppeSelect').value = p.varegruppe || 'Tørrvarer';
        
        const rawMva = parseFloat(p.mva) / 100;
        document.getElementById('vvaSelect').value = rawMva;
        document.getElementById('supplierName').value = p.supplier;

        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        calculatePricing(true);
        document.getElementById('resFinalUnitPriceInput').value = p.unitFinalPrice;
        calculatePricing(false);
        
        document.getElementById('saveBtn').innerText = i18n[currentLang].update;
    }

    function deleteOrder(id) {
        if (confirm(currentLang === 'ar' ? "هل تريد الحذف؟" : "Vil du slette dette produktet?")) {
            savedOrders = savedOrders.filter(p => p.id !== id);
            localStorage.setItem('mr_intl_orders', JSON.stringify(savedOrders));
            renderOrders();
        }
    }

    function updateCardEsker(id, val) {
        const p = savedOrders.find(item => item.id === id);
        if (p) {
            p.orderEsker = val || "1";
            localStorage.setItem('mr_intl_orders', JSON.stringify(savedOrders));
        }
    }

    function updateSelectedCount() {
        const checked = document.querySelectorAll('.select-box:checked').length;
        document.getElementById('txtSelectedCount').innerText = `${checked} ${i18n[currentLang].selected}`;
    }

    function bulkReorder() {
        const checkboxes = document.querySelectorAll('.select-box:checked');
        if(checkboxes.length === 0) {
            alert("Velg produkter først!");
            return;
        }
        let msg = "*Innkjøpsliste til Leverandør:*\n\n";
        checkboxes.forEach((cb, idx) => {
            const pId = parseInt(cb.getAttribute('data-id'));
            const p = savedOrders.find(item => item.id === pId);
            if(p) msg += `${idx + 1}. *${p.name}* -> Antall: *${p.orderEsker}*\n`;
        });
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function sendWhatsAppSupplierOnly(supplierName) {
        const supplierProducts = savedOrders.filter(p => p.supplier === supplierName);
        let text = `Bestilling til *${supplierName}*:\n\n`;
        supplierProducts.forEach((p, idx) => {
            text += `${idx + 1}. *${p.name}* -> Antall: *${p.orderEsker}*\n`;
        });
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function sendWhatsAppMyDetails(supplierName) {
        const supplierProducts = savedOrders.filter(p => p.supplier === supplierName);
        let text = `📋 *Prisrapport [${supplierName}]:*\n\n`;
        supplierProducts.forEach((p, idx) => {
            text += `${idx + 1}. *${p.name}*\n   - Gruppe: ${p.varegruppe}\n   - Pris: ${p.unitFinalPrice} kr\n   - Enhet Kost: ${p.unitCost} kr\n   - Fortjeneste: +${p.unitProfit} kr\n\n`;
        });
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function triggerPrint(isStaffMode) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('no-NO') + ' kl. ' + now.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('printHeaderView').innerText = `Dato: ${dateStr} | ${isStaffMode ? 'Ansatte Prisliste' : 'Eier Prisliste'}`;
        
        if (isStaffMode) {
            document.body.classList.add('staff-print-mode');
        } else {
            document.body.classList.remove('staff-print-mode');
        }
        window.print();
    }

    function exportData() {
        if(savedOrders.length === 0) {
            alert("Ingen data!");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedOrders));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "pris_app_orders_backup.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        const query = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';

        if (savedOrders.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:15px; color:#64748b;">Tomt</div>`;
            return;
        }

        const grouped = {};
        savedOrders.forEach(p => {
            if (p.name.toLowerCase().includes(query) || p.supplier.toLowerCase().includes(query) || (p.varegruppe && p.varegruppe.toLowerCase().includes(query))) {
                if (!grouped[p.supplier]) grouped[p.supplier] = [];
                grouped[p.supplier].push(p);
            }
        });

        for (const supplier in grouped) {
            let blockHtml = `
                <div class="supplier-block">
                    <div class="supplier-header">
                        <div class="supplier-header-top">
                            <span class="supplier-title">${supplier}</span>
                        </div>
                        <div class="supplier-actions">
                            <button class="whatsapp-btn" onclick="sendWhatsAppSupplierOnly('${supplier}')">Bestill 💬</button>
                            <button class="share-me-btn" onclick="sendWhatsAppMyDetails('${supplier}')">Detaljer 📝</button>
                        </div>
                    </div>
            `;

            grouped[supplier].forEach(p => {
                blockHtml += `
                    <div class="product-card">
                        <div class="select-box-container">
                            <input type="checkbox" class="select-box" data-id="${p.id}" onchange="updateSelectedCount()">
                        </div>
                        <div class="product-details">
                            <p class="p-name">${p.name}</p>
                            <div class="p-meta">Gruppe: <b style="color:#0284c7">${p.varegruppe || 'Tørrvarer'}</b></div>
                            <div class="p-meta">
                                Antall: <input type="number" value="${p.orderEsker}" style="width:50px; padding:2px; display:inline-block; font-size:12px;" oninput="updateCardEsker(${p.id}, this.value)">
                            </div>
                            <div class="p-meta">Total Qty: <b>${p.qty} enheter</b> | MVA: <b>${p.mva}</b></div>
                            <div class="actions-row">
                                <button class="action-btn edit-btn" onclick="editProduct(${p.id})">${i18n[currentLang].edit}</button>
                                <button class="action-btn del-btn" onclick="deleteOrder(${p.id})">${i18n[currentLang].del}</button>
                            </div>
                        </div>
                        <div class="p-prices">
                            <div class="p-sales-price">${p.unitFinalPrice} kr</div>
                            <div class="p-cost">Enhet Kost: ${p.unitCost} kr</div>
                            <div class="p-cost">Total Kost: ${p.cost} kr</div>
                            <div class="p-profit">Fortjeneste: +${p.unitProfit} kr</div>
                        </div>
                    </div>
                `;
            });

            blockHtml += `</div>`;
            container.innerHTML += blockHtml;
        }
        updateSelectedCount();
    }

    applyLanguage();
</script>

</body>
</html>
