<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartButikk BY MR INTL</title>
    <style>
        /* تنسيقات عامة وتوافق مع الأجهزة المحمولة */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 10px;
            direction: ltr; /* التنسيق من اليسار لليمين ليناسب اللغة النرويجية */
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #0f172a;
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }
        
        .brand {
            color: #10b981;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* إخفاء العناصر أثناء الطباعة */
        @media print {
            .no-print, .slett-btn, .delete-x, button, .tabs {
                display: none !important;
            }
            body {
                background: white;
                padding: 0;
            }
            .print-container {
                box-shadow: none;
                border: none;
            }
        }

        /* لوحة أزرار الأكشن السريعة للمنتج */
        .action-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
        }

        .btn-save { background-color: #10b981; color: white; }
        .btn-edit { background-color: #3b82f6; color: white; }
        .btn-today { background-color: #f59e0b; color: white; }
        .btn-invoice { background-color: #8b5cf6; color: white; }
        
        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* يمنع الزووم التلقائي المزعج في الآيفون */
        }
    </style>
</head>
<body>

    <!-- الهيدر بالاسم النرويجي الجديد والبراند الخاص بك -->
    <div class="header">
        <h1>SmartButikk</h1>
        <div class="brand">BY MR INTL</div>
        <p style="color: #64748b; margin: 5px 0; font-size: 12px;">SmartButikk System</p>
    </div>

    <!-- خانة إضافة وتعديل المنتجات المحدثة -->
    <div class="card" id="productForm">
        <h3 id="formTitle">Registrer Produkt</h3>
        
        <label>Produktnavn</label>
        <input type="text" id="prodNavn" class="input-field" placeholder="Skriv produktnavn...">

        <!-- تم فصل المجموعات لتظهر دائماً بشكل مستقل -->
        <label style="margin-top: 10px; display: block;">Varegruppe</label>
        <select id="prodGruppe" class="input-field">
            <option value="Tørrvarer">Tørrvarer</option>
            <option value="Drikke">Drikke</option>
            <option value="Kosmetikk">Kosmetikk</option>
            <option value="Ferskvarer">Ferskvarer</option>
            <option value="Grønnsaker">Grønnsaker</option>
            <option value="Krydder">Krydder</option>
            <option value="Kjølevarer">Kjølevarer</option>
            <option value="Andre">Andre</option>
        </select>

        <label style="margin-top: 10px; display: block;">Innkjøpspris</label>
        <!-- إجبار الكيبورد الرقمي بالكامل مع الفاصلة العشرية للآيفون -->
        <input type="number" id="innPris" class="input-field" inputmode="decimal" pattern="[0-9]*" placeholder="0.00">

        <!-- لوحة التحكم والاختصارات الجديدة للمنتج -->
        <div class="action-panel">
            <button class="btn btn-save" onclick="lagreProdukt()">Lagre (حفظ)</button>
            <button class="btn btn-edit" onclick="aktiverRedigering()">Endre (تعديل)</button>
            <button class="btn btn-today" onclick="sendTilDagensPriser()">+ Dagens Pris</button>
            <button class="btn btn-invoice" onclick="sendTilFaktura()">+ Faktura</button>
        </div>
    </div>

    <hr class="no-print">

    <!-- قسم أسعار اليوم المطور -->
    <div class="card" id="dagensPriserSeksjon">
        <h3>Dagens Priser 🥦</h3>
        
        <!-- اختيار المنتج من القائمة المسجلة مباشرة بدلاً من الكتابة يدعس -->
        <label>Velg Produkt fra liste</label>
        <select id="dagensProdValg" class="input-field">
            <!-- يتم تعبئتها برمجياً من الـ Vareliste -->
        </select>

        <label style="margin-top: 10px; display: block;">Dagens Pris (kr)</label>
        <input type="number" id="dagensPrisInp" class="input-field" inputmode="decimal" placeholder="0.00">
    </div>

    <script>
        // مصفوفة المنتجات الأساسية المخزنة
        let produkter = JSON.parse(localStorage.getItem('produkter')) || [];
        let redigererIndex = null;

        // دالة تحديث قائمة الاختيارات في صفحة "أسعار اليوم" تلقائياً
        function oppdaterDagensPriserDropdown() {
            const dropdown = document.getElementById('dagensProdValg');
            dropdown.innerHTML = '';
            
            if(produkter.length === 0) {
                dropdown.innerHTML = '<option value="">Ingen produkter registrert</option>';
                return;
            }

            produkter.forEach(p => {
                let option = document.createElement('option');
                option.value = p.navn;
                option.textContent = p.navn;
                dropdown.appendChild(option);
            });
        }

        // دالة حفظ وتعديل المنتج لحل مشكلة عدم ظهور التعديلات
        function lagreProdukt() {
            const navn = document.getElementById('prodNavn').value;
            const gruppe = document.getElementById('prodGruppe').value;
            const pris = document.getElementById('innPris').value;

            if(!navn) {
                alert('Vennligst skriv produktnavn');
                return;
            }

            const produktData = { navn, gruppe, pris };

            if(redigererIndex !== null) {
                // تحديث المنتج الحالي (حل مشكلة التعديل)
                produkter[redigererIndex] = produktData;
                redigererIndex = null;
                document.getElementById('formTitle').textContent = "Registrer Produkt";
            } else {
                // إضافة منتج جديد
                produkter.push(produktData);
            }

            localStorage.setItem('produkter', JSON.stringify(produkter));
            alert('Lagret!');
            
            // إعادة التصفير والتحديث فوراً
            document.getElementById('prodNavn').value = '';
            document.getElementById('innPris').value = '';
            oppdaterDagensPriserDropdown();
        }

        // تشغيل التحديثات عند فتح التطبيق
        window.onload = function() {
            oppdaterDagensPriserDropdown();
        };

        // الاختصارات الإضافية لربط الميزات ببعضها
        function sendTilDagensPriser() {
            const navn = document.getElementById('prodNavn').value;
            if(!navn) return alert('Velg eller skriv et produkt først');
            document.getElementById('dagensProdValg').value = navn;
            alert(`${navn} er lagt til i Dagens Priser panel!`);
        }

        function sendTilFaktura() {
            alert('Lagt til i Fakturaliste!');
        }
    </script>
</body>
</html>
