<!DOCTYPE html>
<html lang="no" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr intl - BestillingApp v5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; margin: 0; padding: 10px; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 480px; margin: auto; background: white; padding: 16px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* شريط التبديل العلوي */
        .nav-tabs { display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px; margin-bottom: 16px; gap: 4px; }
        .tab-btn { flex: 1; padding: 10px 4px; border: none; background: transparent; font-weight: bold; font-size: 11px; border-radius: 8px; cursor: pointer; color: #475569; transition: 0.2s; text-align: center; }
        .tab-btn.active { background: white; color: #0f172a; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        
        /* أزرار الإجراءات العلوية */
        .top-actions { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .top-actions button, .file-label { flex: 1; min-width: 75px; padding: 8px 4px; border: none; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; text-align: center; display: inline-block; }
        .btn-lang { background: #3b82f6; }
        .btn-import { background: #10b981; }
        .btn-export { background: #475569; }
        .btn-print-kunder { background: #7c3aed; }
        .btn-print-ansatte { background: #db2777; }
        
        h1 { font-size: 26px; font-weight: 900; text-align: center; margin: 0 0 2px 0; color: #0f172a; letter-spacing: -0.5px; }
        .subtitle { font-size: 12px; font-weight: 700; color: #10b981; text-align: center; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .page-section { display: none; }
        .page-section.active { display: block; }
        
        .form-group { background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; text-align: left; position: relative; }
        label { font-size: 11px; font-weight: bold; color: #64748b; display: block; margin-bottom: 4px; }
        
        .input-with-btn { display: flex; gap: 6px; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white; color: #0f172a; }
        input:focus, select:focus { border-color: #10b981; outline: none; }
        
        .scan-btn { background: #0284c7; color: white; border: none; padding: 0 12px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .add-grp-btn { background: #475569; color: white; border: none; padding: 0 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        #scanner-container { display: none; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 12px; position: relative; }
        #scanner-view { width: 100%; min-height: 250px; }
        .close-scan-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; z-index: 10; cursor: pointer; }
        
        .row { display: flex; gap: 8px; margin-bottom: 4px; }
        .col { flex: 1; }
        
        .calc-box { background: #f0fdf4; border: 1px dashed #16a34a; border-radius: 10px; padding: 10px; margin-top: 8px; }
        .calc-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; font-weight: 500; }
        .final-price-input { width: 100px; font-size: 16px; font-weight: 800; color: #16a34a; border: 1px solid #16a34a; text-align: right; padding: 2px 4px; border-radius: 4px; }
        
        .btn-main { width: 100%; background: #10b981; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        
        .search-box { width: 100%; padding: 12px; margin: 15px 0 10px 0; border: 2px solid #10b981; border-radius: 10px; font-size: 15px; font-weight: bold; background: #fff; }
        
        /* ترويسة المجموعة التموينية */
        .group-header-title { background: #e2e8f0; border-left: 4px solid #10b981; padding: 8px 12px; margin: 16px 0 8px 0; font-weight: 800; font-size: 14px; color: #1e293b; text-align: left; border-radius: 6px; }
        
        /* تصميم بطاقة المنتج - مثبت LTR لسلامة النصوص والأسعار اللاتينية */
        .product-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; direction: ltr !important; text-align: left !important; }
        .prod-main-row { display: flex; gap: 12px; align-items: center; width: 100%; }
        .prod-img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; background: #f1f5f9; border: 1px solid #cbd5e1; flex-shrink: 0; }
        .prod-info { flex: 1; min-width: 0; text-align: left !important; }
        .prod-title { font-weight: 700; font-size: 14px; margin: 0; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
        .prod-price-tag { text-align: right; font-weight: 800; font-size: 16px; color: #16a34a; white-space: nowrap; }
        
        /* الأزرار مصفوفة أفقياً في خط واحد ومتناسق تماماً */
        .prod-actions-row { display: flex; gap: 4px; width: 100%; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .action-btn { flex: 1; border: none; padding: 8px 4px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; text-align: center; white-space: nowrap; }
        .btn-order { background: #0284c7; }
        .btn-add-fak { background: #475569; }
        .btn-edit { background: #ea580c; }
        .btn-del { background: #ef4444; max-width: 35px; } /* حجم صغير لزر الحذف الإكس */
        
        .order-qty-input { width: 50px; padding: 2px; font-size: 12px; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; display: inline-block; margin-left: 4px; }
        
        .reorder-sticky-bar { background: #fffbeb; border-top: 2px solid #fef3c7; padding: 12px; margin-top: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn-whatsapp-send { background: #25d366; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        
        .faktura-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 11px; background: white; border-radius: 8px; overflow: hidden; }
        .faktura-table th, .faktura-table td { padding: 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .faktura-table th { background: #475569; color: white; }
        
        .faktura-card { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .faktura-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin-bottom: 6px; font-size: 12px; }

        #fileInput { display: none; }
        .print-only-info { display: none; }

        @media print {
            @page { size: A4; margin: 12mm; }
            body { background: white; padding: 0; color: #000; font-size: 11pt; }
            .app-container { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
            .top-actions, .nav-tabs, .form-group, .calc-box, .btn-main, .search-box, .prod-actions-row, .reorder-sticky-bar, .scan-btn, .add-grp-btn { display: none !important; }
            .product-card { border: none; border-bottom: 1px solid #ddd; padding: 10px 0; page-break-inside: avoid; display: flex !important; justify-content: space-between; align-items: center; direction: ltr !important; }
            .prod-price-tag { color: #000 !important; font-size: 14pt; font-weight: bold; }
            h1 { font-size: 26pt; margin-top: 0; text-align: center; }
            .subtitle { font-size: 13pt; color: #333 !important; margin-bottom: 20px; text-align: center; }
            body.print-mode-kunder .print-only-info { display: none !important; }
            body.print-mode-ansatte .print-only-info { display: block !important; font-size: 10pt; color: #444; margin-top: 4px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-actions">
        <button class="btn-lang" onclick="toggleLanguage()">NO / AR</button>
        <label class="btn-import" for="fileInput" id="lblImportBtn">Import CSV</label>
        <input type="file" id="fileInput" accept=".csv" onchange="handleCSVImport(event)">
        <button class="btn-export" onclick="exportBackup()" id="lblExportBtn">Backup</button>
        <button class="btn-print-kunder" onclick="triggerPrint('kunder')" id="lblPrintKunderBtn">Prisliste 🖨️</button>
        <button class="btn-print-ansatte" onclick="triggerPrint('ansatte')" id="lblPrintAnsatteBtn">Ansatte 🖨️</button>
    </div>

    <h1>Mr intl</h1>
    <div class="subtitle" id="appSub">BestillingApp System</div>

    <div id="scanner-container">
        <button class="close-scan-btn" onclick="stopScanner()">X</button>
        <div id="scanner-view"></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="tabVarelisteBtn" onclick="switchTab('vareliste')">Vareliste</button>
        <button class="tab-btn" id="tabOrdrelisteBtn" onclick="switchTab('ordreliste')">Ordreliste <span id="orderBadge">(0)</span></button>
        <button class="tab-btn" id="tabFakturaBtn" onclick="switchTab('faktura')">Fakturaliste</button>
    </div>

    <div id="sectionVareliste" class="page-section active">
        <input type="hidden" id="editId" value="">
        
        <div class="form-group">
            <label id="lblProdName">Produktnavn</label>
            <div class="input-with-btn">
                <input type="text" id="prodName" placeholder="Skriv produktnavn..." autocomplete="off">
                <button class="scan-btn" id="btnScan1" onclick="startScanner('prodName')">Scan 📷</button>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblBarcode">Strekkode</label>
                    <div class="input-with-btn">
                        <input type="text" id="prodBarcode" placeholder="Barcode">
                        <button class="scan-btn" id="btnScan2" onclick="startScanner('prodBarcode')">Scan</button>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblVaregruppe">Varegruppe</label>
                    <div class="input-with-btn">
                        <select id="prodVaregruppe"></select>
                        <button class="add-grp-btn" onclick="addNewVaregruppeManual()">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col" style="flex: 1.5;">
                <div class="form-group">
                    <label id="lblCost">Innkjøpspris (Total)</label>
                    <input type="number" step="any" id="prodCost" placeholder="0.00" oninput="runCalculations()">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblQty">Antall i eske</label>
                    <input type="number" id="prodQty" value="1" oninput="runCalculations()">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblMargin">Margin</label>
                    <select id="prodMargin" onchange="runCalculations()">
                        <option value="1.3">1.3</option><option value="1.4">1.4</option>
                        <option value="1.5" selected>1.5</option><option value="1.6">1.6</option>
                        <option value="1.7">1.7</option><option value="1.8">1.8</option><option value="1.9">1.9</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblMva">MVA</label>
                    <select id="prodMva" onchange="runCalculations()">
                        <option value="0.25">25%</option>
                        <option value="0.15" selected>15%</option>
                        <option value="0">0%</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblImgUrl">Bilde URL</label>
                    <input type="text" id="prodImgUrl" placeholder="https://...">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblProdUrl">Produkt URL</label>
                    <input type="text" id="prodLinkUrl" placeholder="https://...">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblLeverandoer">Leverandør</label>
                    <input type="text" id="prodSupplier" placeholder="Afro kjøp as">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblLeverandoerUrl">Leverandør URL</label>
                    <input type="text" id="prodSupplierUrl" placeholder="https://...">
                </div>
            </div>
        </div>

        <div class="calc-box">
            <div class="calc-line"><span id="c1">Kost per enhet</span>:<span id="resUnitCost">0.00 kr</span></div>
            <div class="calc-line"><span id="c2">Utsalgspris Eks MVA</span>:<span id="resExMva">0.00 kr</span></div>
            <div class="calc-line" style="margin-top:5px; border-top:1px dashed #16a34a; padding-top:5px; align-items:center;">
                <b id="c3">Utsalgspris (Ink MVA):</b>
                <input type="number" step="any" id="resFinalPriceInput" class="final-price-input" value="0.00" oninput="runCalculations(false)">
            </div>
            <div class="calc-line" style="font-weight:bold; color:#dc2626;">
                <span id="c4">Fortjeneste per enhet:</span><span id="resProfit">0.00 kr</span>
            </div>
        </div>

        <button class="btn-main" id="btnSave" onclick="saveProductToCatalog()">Lagre produkt</button>

        <div style="margin-top: 10px;">
            <input type="text" id="searchCatalogBar" class="search-box" placeholder="🔍 Søk..." oninput="renderCatalogList()">
            <div id="catalogContainer"></div>
        </div>
    </div>

    <div id="sectionOrdreliste" class="page-section">
        <input type="text" id="searchOrderBar" class="search-box" placeholder="Søk i ordreliste..." oninput="renderOrderList()">
        <div id="orderContainer"></div>
        <div class="reorder-sticky-bar">
            <div>
                <b id="lblTotalOrdre">Totalt valgt:</b> 
                <span id="totalOrdreCount" style="color:#ea580c; font-weight:bold;">0</span>
            </div>
            <button class="btn-whatsapp-send" id="btnWhatsappSend" onclick="sendOrderViaWhatsApp()">Send 💬</button>
        </div>
    </div>

    <div id="sectionFaktura" class="page-section">
        <div class="form-group">
            <label id="lblFakSupplier">Leverandørnavn</label>
            <input type="text" id="fakSupplier" placeholder="F.eks. Afro kjøp as">
        </div>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblFakNum">Fakturanummer</label>
                    <input type="text" id="fakNumber" placeholder="Fak #">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblFakDate">Dato</label>
                    <input type="date" id="fakDate">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label id="lblFakItems">Produkt valgt for bekreftelse</label>
            <select id="fakItemSelect" onchange="syncFakturaFieldsFromSelect()">
                <option value="">-- Velg --</option>
            </select>
        </div>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="lblFakRecQty">Mottatt antall (Kasser/Stk)</label>
                    <input type="number" id="fakReceivedQty" value="1">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="lblFakActualCost">Faktisk Innkjøpspris (Total)</label>
                    <input type="number" step="any" id="fakActualCost" placeholder="0.00">
                </div>
            </div>
        </div>
        <button class="btn-main" style="background:#475569;" id="btnNewInvoice" onclick="createNewInvoice()">Opprett Faktura</button>
        
        <div style="margin-top: 20px;" id="fakturaRecordsContainer"></div>
    </div>
</div>

<script>
    let html5QrcodeScanner = null;
    let activeScanTarget = '';

    let varegrupper = JSON.parse(localStorage.getItem('mr_varegrupper')) || ["Tørrvarer", "Drikke", "Kosmetikk", "Ferskvarer", "Grønnsaker", "Andre"];
    let catalog = JSON.parse(localStorage.getItem('mr_catalog_v5')) || [];
    let orderList = JSON.parse(localStorage.getItem('mr_orders_v5')) || [];
    let fakturaList = JSON.parse(localStorage.getItem('mr_faktura_v5')) || [];
    let currentLang = localStorage.getItem('mr_intl_lang') || 'no';

    const words = {
        no: {
            appSub: "BestillingApp System",
            lblImportBtn: "Import CSV", lblExportBtn: "Backup", lblPrintKunderBtn: "Prisliste 🖨️", lblPrintAnsatteBtn: "Ansatte 🖨️",
            varelisteTab: "Vareliste", ordrelisteTab: "Ordreliste", fakturaTab: "Fakturaliste",
            prodName: "Produktnavn", barcode: "Strekkode", varegruppe: "Varegruppe", cost: "Innkjøpspris (Total)",
            qty: "Antall i eske", margin: "Margin", mva: "MVA", imgUrl: "Bilde URL", prodUrl: "Produkt URL", supplier: "Leverandør",
            lblLeverandoerUrl: "Leverandør URL", saveBtn: "Lagre produkt", updateBtn: "Oppdater produkt", searchPlh: "🔍 Søk etter navn eller strekkode...",
            c1: "Kost per enhet", c2: "Utsalgspris Eks MVA", c3: "Utsalgspris (Ink MVA):", c4: "Fortjeneste per enhet:",
            totalValgt: "Totalt valgt:", sendBtn: "Send til WhatsApp 💬", 
            lblFakSupplier: "Leverandørnavn", lblFakNum: "Fakturanummer", lblFakDate: "Dato", lblFakItems: "Mottatt produkt",
            lblFakRecQty: "Mottatt antall (Kasser/Stk)", lblFakActualCost: "Faktisk innkjøpspris (Total)",
            btnNewInvoice: "Bekreft og legg til i faktura", searchOrderPlh: "Søk i ordreliste...",
            btnScan: "Scan 📷", promptGroup: "Skriv inn navnet på den nye varegruppen:", alertEmpty: "Vennligst fyll ut alle felter!",
            alertFileEmpty: "Filen er tom!", alertSuccess: "Vellykket! Importert {count} produkter.", confirmDelete: "Slette?",
            thProd: "Produkt", thCost: "Kost", thIncome: "Inntekt/Verdi", thProfit: "Gevinst", btnDelFak: "Slett",
            lblOrderBtn: "+ الطلبية", lblInvoiceBtn: "📄+ الفاتورة", lblEditBtn: "تعديل", lblDeleteBtn: "X",
            selectPlh: "-- Velg produkt --", textLeverandoer: "Leverandør", textGruppe: "Gruppe", textAntall: "Antall:"
        },
        ar: {
            appSub: "نظام تطبيق الطلبيات وإدارة المتجر",
            lblImportBtn: "استيراد ملف CSV", lblExportBtn: "نسخة احتياطية", lblPrintKunderBtn: "قائمة الأسعار 🖨️", lblPrintAnsatteBtn: "كشف الموظفين 🖨️",
            varelisteTab: "قائمة المنتجات", ordrelisteTab: "قائمة الطلبيات", fakturaTab: "تأكيد واستلام الفواتير",
            prodName: "اسم المنتج", barcode: "الباركود", varegruppe: "المجموعة التموينية", cost: "سعر الشراء الإجمالي",
            qty: "الكمية داخل الكرتونة", margin: "نسبة الربح (Margin)", mva: "الضريبة MVA", imgUrl: "رابط صورة المنتج", prodUrl: "رابط صفحة المنتج", supplier: "اسم المورد",
            lblLeverandoerUrl: "رابط المورد الالكتروني", saveBtn: "حفظ في الكتالوج", updateBtn: "تعديل وحفظ البيانات", searchPlh: "🔍 ابحث هنا بالاسم أو الباركود...",
            c1: "التكلفة للقطعة المفردة", c2: "سعر البيع قبل الضريبة", c3: "سعر البيع النهائي (مع الضريبة):", c4: "صافي الأرباح للقطعة:",
            totalValgt: "إجمالي السلع المحددة:", sendBtn: "إرسال الكشف عبر الواتساب 💬",
            lblFakSupplier: "اسم المورد صاحب الفاتورة", lblFakNum: "رقم الفاتورة", lblFakDate: "تاريخ الفاتورة", lblFakItems: "المنتج المستهدف بالفاتورة",
            lblFakRecQty: "الكمية المستلمة فعلياً", lblFakActualCost: "تكلفة الشراء الفعلية للفاتورة",
            btnNewInvoice: "تأكيد استلام المنتج وإضافته للفاتورة", searchOrderPlh: "البحث في قائمة الطلبيات المحددة...",
            btnScan: "مسح 📷", promptGroup: "أدخل اسم المجموعة التموينية الجديدة:", alertEmpty: "يرجى ملء جميع الحقول المطلوبة!",
            alertFileEmpty: "الملف فارغ تماماً!", alertSuccess: "تم بنجاح! استيراد {count} منتج إلى النظام.", confirmDelete: "هل أنت متأكد من الحذف؟",
            thProd: "المنتج", thCost: "التكلفة الإجمالية", thIncome: "القيمة الإجمالية للبيع", thProfit: "صافي الربح", btnDelFak: "حذف الفاتورة",
            lblOrderBtn: "+ طلبية", lblInvoiceBtn: "📄+ الفاتورة", lblEditBtn: "تعديل", lblDeleteBtn: "X",
            selectPlh: "-- اختر المنتج --", textLeverandoer: "المورد", textGruppe: "المجموعة", textAntall: "الكمية:"
        }
    };

    function switchTab(tab) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if(tab === 'vareliste') {
            document.getElementById('sectionVareliste').classList.add('active');
            document.getElementById('tabVarelisteBtn').classList.add('active');
            renderCatalogList();
        } else if(tab === 'ordreliste') {
            document.getElementById('sectionOrdreliste').classList.add('active');
            document.getElementById('tabOrdrelisteBtn').classList.add('active');
            renderOrderList();
        } else {
            document.getElementById('sectionFaktura').classList.add('active');
            document.getElementById('tabFakturaBtn').classList.add('active');
            populateFakturaSelect();
            renderFakturaRecords();
        }
    }

    function runCalculations(autoFinal = true) {
        const cost = parseFloat(document.getElementById('prodCost').value) || 0;
        const qty = parseFloat(document.getElementById('prodQty').value) || 1;
        const margin = parseFloat(document.getElementById('prodMargin').value) || 1.5;
        const mva = parseFloat(document.getElementById('prodMva').value) || 0;

        const unitCost = cost / qty;
        const exMva = unitCost * margin;
        
        let finalPrice = 0;
        if (autoFinal) {
            finalPrice = exMva * (1 + mva);
            document.getElementById('resFinalPriceInput').value = finalPrice.toFixed(2);
        } else {
            finalPrice = parseFloat(document.getElementById('resFinalPriceInput').value) || 0;
        }

        const calculatedExMva = finalPrice / (1 + mva);
        const profit = calculatedExMva - unitCost;

        document.getElementById('resUnitCost').innerText = unitCost.toFixed(2) + " kr";
        document.getElementById('resExMva').innerText = exMva.toFixed(2) + " kr";
        document.getElementById('resProfit').innerText = profit.toFixed(2) + " kr";
    }

    function startScanner(targetInputId) {
        activeScanTarget = targetInputId;
        document.getElementById('scanner-container').style.display = 'block';
        if(html5QrcodeScanner === null) {
            html5QrcodeScanner = new Html5Qrcode("scanner-view");
        }
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                document.getElementById(activeScanTarget).value = decodedText;
                stopScanner();
                let match = catalog.find(p => p.barcode === decodedText);
                if(match) loadToForm(match.id);
            },
            (err) => {}
        ).catch((err) => { alert("Kamerafeil: " + err); });
    }

    function stopScanner() {
        if(html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('scanner-container').style.display = 'none';
            });
        }
    }

    function saveProductToCatalog() {
        const name = document.getElementById('prodName').value.trim();
        if(!name) return;

        const editId = document.getElementById('editId').value;
        const pData = {
            id: editId ? parseInt(editId) : Date.now(),
            name: name,
            barcode: document.getElementById('prodBarcode').value.trim(),
            varegruppe: document.getElementById('prodVaregruppe').value,
            cost: parseFloat(document.getElementById('prodCost').value) || 0,
            qty: parseInt(document.getElementById('prodQty').value) || 1,
            margin: parseFloat(document.getElementById('prodMargin').value) || 1.5,
            mva: parseFloat(document.getElementById('prodMva').value) || 0,
            img: document.getElementById('prodImgUrl').value.trim(),
            link: document.getElementById('prodLinkUrl').value.trim(),
            supplier: document.getElementById('prodSupplier').value.trim() || "Afro kjøp as",
            supplierUrl: document.getElementById('prodSupplierUrl').value.trim(),
            finalPrice: parseFloat(document.getElementById('resFinalPriceInput').value) || 0
        };

        if(editId) {
            catalog = catalog.map(p => p.id === pData.id ? pData : p);
            document.getElementById('editId').value = "";
        } else {
            catalog.unshift(pData);
        }

        localStorage.setItem('mr_catalog_v5', JSON.stringify(catalog));
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodBarcode').value = '';
        document.getElementById('prodCost').value = '';
        document.getElementById('prodQty').value = '1';
        document.getElementById('prodImgUrl').value = '';
        document.getElementById('prodLinkUrl').value = '';
        document.getElementById('prodSupplierUrl').value = '';
        
        applyLanguageStrings();
    }

    // تعديل العرض التلقائي والبحث: البيانات تظهر دائماً وتفلتر مباشرة بناء على المجموعات
    function renderCatalogList() {
        const container = document.getElementById('catalogContainer');
        const query = document.getElementById('searchCatalogBar').value.toLowerCase().trim();
        container.innerHTML = '';
        const l = currentLang;

        // إذا كان البحث فارغاً، يعرض كامل الكتالوج تلقائياً
        const filtered = catalog.filter(p => p.name.toLowerCase().includes(query) || (p.barcode && p.barcode.includes(query)));
        
        let uniqueGroupsInResult = [...new Set(filtered.map(p => p.varegruppe))];

        uniqueGroupsInResult.forEach(grp => {
            const header = document.createElement('div');
            header.className = 'group-header-title';
            header.innerText = grp;
            container.appendChild(header);

            let groupProducts = filtered.filter(p => p.varegruppe === grp);
            groupProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const imgEl = p.img ? `<img src="${p.img}" class="prod-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'50\' height=\'50\'><rect width=\'50\' height=\'50\' fill=\'%23e2e8f0\'/><text x=\'50%27\' y=\'50%27\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'14\'>📦</text></svg>'">` : `<div class="prod-img" style="display:flex;align-items:center;justify-content:center;font-size:18px;">📦</div>`;
                
                card.innerHTML = `
                    <div class="prod-main-row">
                        ${imgEl}
                        <div class="prod-info">
                            <p class="prod-title">${p.name}</p>
                            <div class="prod-meta">
                                ${words[l].textLeverandoer}: <b>${p.supplier}</b> 
                                ${p.supplierUrl ? `| <a href="${p.supplierUrl}" target="_blank" style="color:#3b82f6;text-decoration:none;">🌐 Link</a>` : ''}
                            </div>
                            <div class="print-only-info">
                                BC: ${p.barcode || '-'} | Innkjøp: ${(p.cost/p.qty).toFixed(2)} kr
                            </div>
                        </div>
                        <div class="prod-price-tag">${(p.finalPrice || 0).toFixed(2)} kr</div>
                    </div>
                    <div class="prod-actions-row">
                        <button class="action-btn btn-order" onclick="addToOrderList(${p.id})">${words[l].lblOrderBtn}</button>
                        <button class="action-btn btn-add-fak" onclick="autoSendToFakturaForm(${p.id})">${words[l].lblInvoiceBtn}</button>
                        <button class="action-btn btn-edit" onclick="loadToForm(${p.id})">${words[l].lblEditBtn}</button>
                        <button class="action-btn btn-del" onclick="deleteFromCatalog(${p.id})">${words[l].lblDeleteBtn}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function loadToForm(id) {
        const p = catalog.find(item => item.id === id);
        if(!p) return;
        document.getElementById('editId').value = p.id;
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodBarcode').value = p.barcode || '';
        document.getElementById('prodVaregruppe').value = p.varegruppe;
        document.getElementById('prodCost').value = p.cost;
        document.getElementById('prodQty').value = p.qty;
        document.getElementById('prodMargin').value = p.margin;
        document.getElementById('prodMva').value = p.mva;
        document.getElementById('prodImgUrl').value = p.img;
        document.getElementById('prodLinkUrl').value = p.link;
        document.getElementById('prodSupplier').value = p.supplier;
        document.getElementById('prodSupplierUrl').value = p.supplierUrl || '';
        document.getElementById('resFinalPriceInput').value = (p.finalPrice || 0).toFixed(2);
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        runCalculations(false);
        
        const l = currentLang;
        document.getElementById('btnSave').innerText = words[l].updateBtn;
    }

    function autoSendToFakturaForm(id) {
        const p = catalog.find(item => item.id === id);
        if(!p) return;
        
        switchTab('faktura');
        populateFakturaSelect(); 
        
        document.getElementById('fakSupplier').value = p.supplier;
        document.getElementById('fakItemSelect').value = p.id;
        document.getElementById('fakReceivedQty').value = "1";
        document.getElementById('fakActualCost').value = p.cost; 
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function syncFakturaFieldsFromSelect() {
        const itemId = document.getElementById('fakItemSelect').value;
        if(!itemId) return;
        const p = catalog.find(item => item.id == itemId);
        if(p) {
            document.getElementById('fakSupplier').value = p.supplier;
            document.getElementById('fakActualCost').value = p.cost;

    function addToOrderList(id) {
        const p = catalog.find(item => item.id === id);
        if(!p) return;
        if(!orderList.find(o => o.catalogId === id)) {
            orderList.push({ id: Date.now(), catalogId: p.id, name: p.name, supplier: p.supplier, antall: 1 });
            localStorage.setItem('mr_orders_v5', JSON.stringify(orderList));
            document.getElementById('orderBadge').innerText = `(${orderList.length})`;
        }
    }

    function renderOrderList() {
        const container = document.getElementById('orderContainer');
        container.innerHTML = '';
        document.getElementById('totalOrdreCount').innerText = orderList.length;
        const l = currentLang;

        orderList.forEach(o => {
            const card = document.createElement('div');

                    <div class="prod-info">

    function sendOrderViaWhatsApp() {
        let text = "*Varebestilling:*\n\n";
        orderList.forEach((o, i) => { text += `${i+1}. ${o.name} (${o.supplier}) -> *${o.antall}*\n`; });
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function populateFakturaSelect() {
        const select = document.getElementById('fakItemSelect');
        const currentVal = select.value;
        select.innerHTML = `<option value="">${words[currentLang].selectPlh}</option>`;
        catalog.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.innerText = p.name;
            select.appendChild(opt);
        });
        if(currentVal) select.value = currentVal;
    }

    function createNewInvoice() {
        const sup = document.getElementById('fakSupplier').value.trim();
        const num = document.getElementById('fakNumber').value.trim();
        const date = document.getElementById('fakDate').value;
        const itemId = document.getElementById('fakItemSelect').value;
        const recQty = parseInt(document.getElementById('fakReceivedQty').value) || 1;
        const actualCost = parseFloat(document.getElementById('fakActualCost').value) || 0;

        if(!sup || !num || !itemId) { alert(words[currentLang].alertEmpty); return; }
        const prod = catalog.find(p => p.id == itemId);

        const unitCost = actualCost / prod.qty;
        const calculatedExMva = prod.finalPrice / (1 + prod.mva);
        const profitPerUnit = calculatedExMva - unitCost;
        
        const totalProfitInvoice = profitPerUnit * (prod.qty * recQty);
        const totalCostInvoice = actualCost * recQty;

        const newFak = {
            id: Date.now(),
            supplier: sup,
            number: num,
            date: date || new Date().toISOString().split('T')[0],
            prodName: prod.name,
            totalCost: totalCostInvoice,
            totalProfit: totalProfitInvoice
        };

        fakturaList.unshift(newFak);
        localStorage.setItem('mr_faktura_v5', JSON.stringify(fakturaList));
        
        document.getElementById('fakNumber').value = '';
        document.getElementById('fakReceivedQty').value = '1';
        document.getElementById('fakActualCost').value = '';
        document.getElementById('fakItemSelect').value = '';
        renderFakturaRecords();
    }

                            <th>${words[l].thCost}</th>
                            <th>${words[l].thIncome}</th>

    function deleteFromCatalog(id) {
        if(confirm(words[currentLang].confirmDelete)) {

    function triggerPrint(mode) {
        document.body.classList.remove('print-mode-kunder', 'print-mode-ansatte');
        if(mode === 'kunder') {
            document.body.classList.add('print-mode-kunder');
        } else {
            document.body.classList.add('print-mode-ansatte');
        }
        window.print();
    }

    // دالة استيراد متوافقة كلياً مع الفواصل المنقوطة لملفك
    function handleCSVImport(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const content = evt.target.result;
            const lines = content.split(/\r?\n/);
            if (lines.length < 1) { alert(words[currentLang].alertFileEmpty); return; }

            // تحديد الهيدر بناء على علامة الفاصلة المنقوطة (;) لملفك الحالي
            let headers = lines[0].toLowerCase().split(';').map(h => h.replace(/"/g, '').trim());
            
            let idxVarenummer = headers.indexOf('varenummer');
            let idxNavn = headers.indexOf('navn');
            let idxCost = headers.indexOf('innkjoepspris');
            let idxVaregruppe = headers.indexOf('varegruppe');
            let idxSupplier = headers.indexOf('leverandoer');
            let idxMva = headers.indexOf('mva_prosent');
            let idxPrice = headers.indexOf('pris_inkl_mva');

            let count = 0;

            for(let i = 1; i < lines.length; i++) {
                let currentLine = lines[i].trim();
                if(!currentLine) continue;
                
                let cols = currentLine.split(';');
                if(cols.length <= 1) continue;

                let name = cols[idxNavn] ? cols[idxNavn].replace(/^"|"$/g, '').trim() : '';
                if(!name) continue;

                let barcode = cols[idxVarenummer] ? cols[idxVarenummer].replace(/"/g, '').trim() : '';
                let importedGroup = (idxVaregruppe !== -1 && cols[idxVaregruppe]) ? cols[idxVaregruppe].replace(/"/g, '').trim() : 'Tørrvarer';
                let supplier = (idxSupplier !== -1 && cols[idxSupplier]) ? cols[idxSupplier].replace(/^"|"$/g, '').trim() : 'Afro kjøp as';
                
                let rawCost = (idxCost !== -1 && cols[idxCost]) ? cols[idxCost].replace(/"/g, '').replace(',', '.').trim() : '0';
                let cost = parseFloat(rawCost) || 0;

                let rawPrice = (idxPrice !== -1 && cols[idxPrice]) ? cols[idxPrice].replace(/"/g, '').replace(',', '.').trim() : '0';
                let finalPrice = parseFloat(rawPrice) || 0;
                
                let rawMva = (idxMva !== -1 && cols[idxMva]) ? cols[idxMva].replace(/"/g, '').trim() : '15';
                let mvaPercent = parseFloat(rawMva) || 15;
                let mvaVal = mvaPercent === 25 ? 0.25 : (mvaPercent === 15 ? 0.15 : 0);

                if(importedGroup && !varegrupper.includes(importedGroup)) {
                    varegrupper.push(importedGroup);
                }

                // منع التكرار
                catalog = catalog.filter(p => p.name !== name && (barcode === "" || p.barcode !== barcode));

                catalog.push({
                    id: Date.now() + Math.random(),
                    name: name,
                    barcode: barcode,
                    varegruppe: importedGroup,
                    supplier: supplier,
                    supplierUrl: '',
                    cost: cost,
                    qty: 1, 
                    margin: 1.5, 
                    mva: mvaVal, 
                    img: '', 
                    link: '',
                    finalPrice: finalPrice > 0 ? finalPrice : (cost * 1.5 * (1 + mvaVal))
                });
                count++;
            }
            
            localStorage.setItem('mr_catalog_v5', JSON.stringify(catalog));
            localStorage.setItem('mr_varegrupper', JSON.stringify(varegrupper));
            applyLanguageStrings();
            
            let successMsg = words[currentLang].alertSuccess.replace("{count}", count);
            alert(successMsg);
        };
        reader.readAsText(file, "UTF-8");
    }

    function exportBackup() {
        const str = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(catalog));
        const dl = document.createElement('a');
        dl.setAttribute("href", str);
        dl.setAttribute("download", "MrIntl_backup.json");
        document.body.appendChild(dl);
        dl.click();
        dl.remove();
    }

    // التشغيل الأولي والتأكيد على بقاء السلع معروضة دائماً
    applyLanguageStrings();
